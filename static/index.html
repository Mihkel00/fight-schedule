    <!-- 1. WebSite — enables Google sitelinks search box -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "FightSchedule",
      "url": "https://fightschedule.live",
      "description": "Complete UFC and boxing fight schedule with automatic timezone conversion, live updates, and AI-powered fight previews.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://fightschedule.live/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- 2. Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "FightSchedule",
      "url": "https://fightschedule.live",
      "logo": "https://fightschedule.live/favicon.svg",
      "description": "Live fight calendar for UFC, boxing, and MMA events with automatic timezone conversion and AI-powered previews.",
      "sameAs": []
    }
    </script>

    <!-- 3. FAQPage — targets rich snippets for common queries -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What time is the UFC fight tonight?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "FightSchedule automatically converts all UFC event times to your local timezone. Visit fightschedule.live to see tonight's main card, prelims, and early prelims start times in your timezone."
          }
        },
        {
          "@type": "Question",
          "name": "What boxing fights are on this weekend?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "FightSchedule lists all upcoming boxing events including main card bouts, undercard fights, venues, and broadcast information. Filter by boxing to see this weekend's schedule."
          }
        },
        {
          "@type": "Question",
          "name": "How do I find upcoming UFC events?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Visit fightschedule.live for a complete calendar of all confirmed UFC events. Each event page shows the full fight card, venue, date and time in your timezone, and AI-powered fight previews."
          }
        },
        {
          "@type": "Question",
          "name": "Does FightSchedule cover boxing and UFC?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. FightSchedule covers UFC, boxing, and other major MMA promotions. All events include full fight cards, venues, dates, and timezone-adjusted start times."
          }
        },
        {
          "@type": "Question",
          "name": "What timezone are the fight times shown in?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "All fight times on FightSchedule are automatically converted to your local timezone using your browser settings. No manual conversion needed."
          }
        }
      ]
    }
    </script>

      <header>
        <h1>FightSchedule — UFC & Boxing Fight Calendar</h1>
        <p>Complete UFC and boxing fight schedule with automatic timezone conversion. Live updates on fight dates, times, venues, and AI-powered previews for all major MMA and boxing events.</p>
        <p><a href="https://fightschedule.live/">View the full fight schedule →</a></p>
      </header>

      <section>
        <h2>Upcoming UFC Events</h2>
        <p>Find every confirmed UFC event including numbered PPVs, Fight Nights, and UFC on ESPN cards. Each listing includes the full fight card, main event, co-main event, venue, city, and start times.</p>
      </section>

      <section>
        <h2>Upcoming Boxing Events</h2>
        <p>Track all major boxing events from Top Rank, Matchroom, PBC, Golden Boy, and more. See fight cards, venues, broadcast information, and start times in your timezone.</p>
      </section>

      <section>
        <h2>Fight Times in Your Timezone</h2>
        <p>All event times are automatically converted to your local timezone. No more calculating ET/PT/GMT offsets — FightSchedule handles it for you.</p>
      </section>

      <section>
        <h2>AI-Powered Fight Previews</h2>
        <p>Get AI-generated fight previews and analysis for main events. Includes fighter stats, reach comparisons, win streaks, and betting context.</p>
      </section>
