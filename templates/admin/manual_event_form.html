{% extends 'admin/master.html' %}

{% block body %}
<style>
    .admin-panel { background: #0a0a0a; color: #f5f5f5; padding: 30px; min-height: 100vh; }
    .panel-header { margin-bottom: 30px; }
    .panel-header h1 { font-size: 2rem; font-weight: 700; }
    .form-card { background: #141414; border: 1px solid #252525; border-radius: 8px; padding: 30px; max-width: 700px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #a8a8a8; }
    .form-group input, .form-group select { width: 100%; background: #1a1a1a; color: #f5f5f5; border: 1px solid #252525; padding: 10px 15px; border-radius: 4px; font-size: 1rem; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #fb923c; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 4px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; font-size: 0.9rem; }
    .btn-primary { background: #fb923c; color: #000; }
    .btn-secondary { background: #252525; color: #f5f5f5; }
    .form-actions { display: flex; gap: 10px; margin-top: 25px; }
</style>

<div class="admin-panel">
    <div class="panel-header">
        <h1>{{ 'Edit' if item else 'Add' }} Manual Event</h1>
    </div>

    <div class="form-card">
        <form method="POST">
            <div class="form-row">
                <div class="form-group">
                    <label>Fighter 1</label>
                    <input type="text" name="fighter1" value="{{ item.fighter1 if item else '' }}" required placeholder="e.g. Canelo Alvarez">
                </div>
                <div class="form-group">
                    <label>Fighter 2</label>
                    <input type="text" name="fighter2" value="{{ item.fighter2 if item else '' }}" required placeholder="e.g. David Benavidez">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" name="date" value="{{ item.date if item else '' }}" required>
                </div>
                <div class="form-group">
                    <label>Time (ET)</label>
                    <input type="time" name="time" value="{{ item.time if item else '' }}" placeholder="e.g. 21:00">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Sport</label>
                    <select name="sport">
                        <option value="Boxing" {{ 'selected' if item and item.sport == 'Boxing' }}>Boxing</option>
                        <option value="UFC" {{ 'selected' if item and item.sport == 'UFC' }}>UFC</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Card Type</label>
                    <select name="card_type">
                        <option value="Main Card" {{ 'selected' if item and item.card_type == 'Main Card' }}>Main Card</option>
                        <option value="Prelims" {{ 'selected' if item and item.card_type == 'Prelims' }}>Prelims</option>
                        <option value="Early Prelims" {{ 'selected' if item and item.card_type == 'Early Prelims' }}>Early Prelims</option>
                    </select>
                </div>
            </div>
            <div class="form-group">
                <label>Event Name</label>
                <input type="text" name="event_name" value="{{ item.event_name if item else '' }}" placeholder="e.g. UFC 310">
            </div>
            <div class="form-group">
                <label>Venue</label>
                <input type="text" name="venue" value="{{ item.venue if item else '' }}" placeholder="e.g. T-Mobile Arena, Las Vegas">
            </div>
            <div class="form-group">
                <label>Weight Class</label>
                <input type="text" name="weight_class" value="{{ item.weight_class if item else '' }}" placeholder="e.g. Middleweight or Title">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">{{ 'Update' if item else 'Add' }} Event</button>
                <a href="{{ url_for('.index') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
