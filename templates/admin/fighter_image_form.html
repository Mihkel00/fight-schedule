{% extends 'admin/master.html' %}

{% block body %}
<style>
    .admin-panel { background: #0a0a0a; color: #f5f5f5; padding: 30px; min-height: 100vh; }
    .panel-header { margin-bottom: 30px; }
    .panel-header h1 { font-size: 2rem; font-weight: 700; }
    .form-card { background: #141414; border: 1px solid #252525; border-radius: 8px; padding: 30px; max-width: 600px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #a8a8a8; }
    .form-group input, .form-group select { width: 100%; background: #1a1a1a; color: #f5f5f5; border: 1px solid #252525; padding: 10px 15px; border-radius: 4px; font-size: 1rem; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #fb923c; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 4px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; font-size: 0.9rem; }
    .btn-primary { background: #fb923c; color: #000; }
    .btn-secondary { background: #252525; color: #f5f5f5; }
    .form-actions { display: flex; gap: 10px; margin-top: 25px; }
</style>

<div class="admin-panel">
    <div class="panel-header">
        <h1>{{ 'Edit' if item else 'Add' }} Fighter Image Override</h1>
    </div>

    <div class="form-card">
        <form method="POST">
            <div class="form-group">
                <label>Fighter Name</label>
                <input type="text" name="fighter_name" value="{{ item.fighter_name if item else '' }}" required placeholder="e.g. Conor McGregor">
            </div>
            <div class="form-group">
                <label>Image URL</label>
                <input type="text" name="image_url" value="{{ item.image_url if item else '' }}" required placeholder="https://...">
            </div>
            <div class="form-group">
                <label>Sport</label>
                <select name="sport">
                    <option value="Boxing" {{ 'selected' if item and item.sport == 'Boxing' }}>Boxing</option>
                    <option value="UFC" {{ 'selected' if item and item.sport == 'UFC' }}>UFC</option>
                </select>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">{{ 'Update' if item else 'Add' }} Override</button>
                <a href="{{ url_for('.index') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
