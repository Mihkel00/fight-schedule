{% extends 'admin/master.html' %}

{% block body %}
<style>
    .admin-panel { background: #0e0c0c; color: #efe5e4; padding: 30px; min-height: 100vh; }
    .panel-header { margin-bottom: 30px; }
    .panel-header h1 { font-size: 2rem; font-weight: 700; }
    .form-card { background: #171515; border: 1px solid #302c2b; border-radius: 8px; padding: 30px; max-width: 600px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #998c8a; }
    .form-group input { width: 100%; background: #211e1d; color: #efe5e4; border: 1px solid #302c2b; padding: 10px 15px; border-radius: 4px; font-size: 1rem; }
    .form-group input:focus { outline: none; border-color: #fb923c; }
    .form-group .hint { font-size: 0.8rem; color: #666; margin-top: 5px; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 4px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; font-size: 0.9rem; }
    .btn-primary { background: #fb923c; color: #000; }
    .btn-secondary { background: #302c2b; color: #efe5e4; }
    .form-actions { display: flex; gap: 10px; margin-top: 25px; }
</style>

<div class="admin-panel">
    <div class="panel-header">
        <h1>Add Time Override</h1>
    </div>

    <div class="form-card">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Matchup</label>
                <input type="text" name="matchup" required placeholder="e.g. Fighter1 vs Fighter2">
                <div class="hint">Must match exactly as shown on the site (e.g. "Canelo Alvarez vs David Benavidez")</div>
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" required>
            </div>
            <div class="form-group">
                <label>Override Time</label>
                <input type="text" name="time" required placeholder="e.g. 9:00 PM ET">
                <div class="hint">Enter the time as you want it displayed (e.g. "9:00 PM ET", "10:00 PM ET")</div>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Add Override</button>
                <a href="{{ url_for('.index') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
