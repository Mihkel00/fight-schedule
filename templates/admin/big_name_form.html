{% extends 'admin/master.html' %}

{% block body %}
<style>
    .admin-panel { background: #130807; color: #efe5e4; padding: 30px; min-height: 100vh; }
    .panel-header { margin-bottom: 30px; }
    .panel-header h1 { font-size: 2rem; font-weight: 700; }
    .form-card { background: #1e100e; border: 1px solid #352826; border-radius: 8px; padding: 30px; max-width: 600px; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; color: #998c8a; }
    .form-group input, .form-group select { width: 100%; background: #261918; color: #efe5e4; border: 1px solid #352826; padding: 10px 15px; border-radius: 4px; font-size: 1rem; }
    .form-group input:focus, .form-group select:focus { outline: none; border-color: #fb923c; }
    .btn { display: inline-block; padding: 10px 20px; border-radius: 4px; font-weight: 600; text-decoration: none; cursor: pointer; border: none; font-size: 0.9rem; }
    .btn-primary { background: #fb923c; color: #000; }
    .btn-secondary { background: #352826; color: #efe5e4; }
    .form-actions { display: flex; gap: 10px; margin-top: 25px; }
</style>

<div class="admin-panel">
    <div class="panel-header">
        <h1>Add Big Name Fighter</h1>
    </div>

    <div class="form-card">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Fighter Name</label>
                <input type="text" name="name" required placeholder="e.g. Canelo Alvarez">
            </div>
            <div class="form-group">
                <label>Sport</label>
                <select name="sport">
                    <option value="Boxing">Boxing</option>
                    <option value="UFC">UFC</option>
                </select>
            </div>
            <div class="form-group">
                <label>Notes (optional)</label>
                <input type="text" name="notes" placeholder="e.g. P4P #1">
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Add Fighter</button>
                <a href="{{ url_for('.index') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
